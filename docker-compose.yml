# Run from repo root: docker compose up -d --build

networks:
  ct-net:
    driver: bridge

volumes:
  ct_db_data:

services:
  ct-backend:
    container_name: ct_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=http://localhost:9800,http://127.0.0.1:9800
    ports:
      - "9801:8000"
    volumes:
      - ct_db_data:/app/app/data
    networks:
      - ct-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ct-frontend:
    container_name: ct_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "9800:80"
    depends_on:
      - ct-backend
    networks:
      - ct-net
