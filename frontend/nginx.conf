server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* calls to the FastAPI backend container
    location /api/ {
        proxy_pass http://ct-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Pass FastAPI docs through nginx for convenience
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://ct-backend:8000;
        proxy_set_header Host $host;
    }
}
